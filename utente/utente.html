<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="user-profile-title">Profilo Utente</title>
    <link rel="icon" href="https://i.ibb.co/b5HgvzCB/Spottio-Logo-2.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../impostazioni/body.css">
</head>
<body class="flex min-h-screen bg-gray-50">
    <div id="sidebar-container" class="w-1/5 bg-white p-6 rounded-r-2xl shadow-xl flex flex-col justify-start items-start sticky top-0 h-screen transition-all duration-300">
        <h2 id="menu-title" class="text-2xl font-bold text-gray-800 mb-6 w-full">Menu</h2>
        <div id="nav-container" class="w-full"></div>
    </div>
    
    <div class="flex-grow p-8 flex flex-col items-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-3xl mx-auto">
            <div class="flex flex-col items-center mb-6">
                <div id="profile-image-container" class="w-32 h-32 rounded-full border-4 border-white shadow-lg mb-4 bg-gray-100">
                    </div>
                
                <h1 id="user-profile-name" class="text-4xl font-bold text-gray-800 mb-2 flex items-center justify-center"></h1>
                
                <p id="user-profile-bio" class="text-gray-600 text-lg text-center max-w-md"></p>
                
                <div class="mt-4 flex flex-col items-center w-full">
                    <div class="flex space-x-8 mb-4">
                        <div class="flex flex-col items-center">
                            <span id="followers-count" class="text-2xl font-bold text-gray-800">0</span>
                            <span class="text-sm font-semibold uppercase text-gray-500">Follower</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <span id="following-count" class="text-2xl font-bold text-gray-800">0</span>
                            <span class="text-sm font-semibold uppercase text-gray-500">Seguiti</span>
                        </div>
                    </div>
                    <button id="follow-button" class="mt-2 px-8 py-2.5 rounded-full font-bold text-white transition-colors duration-200 focus:outline-none hidden shadow-md">
                        Segui
                    </button>
                </div>
            </div>

            <hr class="my-8 border-gray-100">

            <h2 class="text-2xl font-bold text-gray-800 mb-6 pl-2 border-l-4 border-blue-500">Post Pubblicati</h2>
            <div id="user-posts-container" class="space-y-6">
                <p id="no-posts-message" class="text-gray-500 text-center text-lg italic">Caricamento post in corso...</p>
            </div>
        </div>
    </div>
    
    <script src="../load-firebase.js"></script>
    <script src="utente.js"></script>
    <script src="../load-nav-scripts.js"></script>
</body>
</html>
