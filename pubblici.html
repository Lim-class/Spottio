<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pubblici</title>
    <link rel="icon" href="https://i.ibb.co/b5HgvzCB/Spottio-Logo-2.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            transition: background-color 0.3s ease;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .post { transition: transform 0.2s ease; }
        #report-modal { display: none; }
        #report-modal.open { display: flex; }
        #posts-container .hidden { display: none;}
        [id^="comment-section-"] { animation: fadeIn 0.3s ease-in-out;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); }}
        
        /* Loader per il bottone pubblica */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex min-h-screen">
    
    <div class="w-1/5 bg-white p-6 rounded-r-2xl shadow-xl flex flex-col justify-start items-start sticky top-0 h-screen">
        <h2 id="menu-title" class="text-2xl font-bold text-gray-800 mb-6">Menu</h2>
        <div id="nav-container" class="w-full"></div>
        
        <div class="mt-auto pt-6 flex flex-col items-start w-full space-y-4 relative">
            <div class="relative w-full">
                <button id="language-toggle" class="flex items-center w-full text-lg font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-100 p-2 rounded-lg transition duration-200 focus:outline-none">
                    <img id="selected-flag" src="https://flagcdn.com/it.svg" alt="Bandiera Italiana" class="h-4 w-6 mr-2">
                    <span id="selected-lang-text">Italiano</span>
                    <svg id="dropdown-icon" class="w-4 h-4 ml-auto transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="language-dropdown-container"></div>
            </div>
            <a href="index.html" id="logout-link" class="text-lg font-medium text-red-600 hover:underline transition duration-200" data-translate="logout">Esci</a>
        </div>
    </div>

    <div class="flex-grow p-8 flex justify-center overflow-y-auto">
        <div class="w-full max-w-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-bold text-gray-800">Post Pubblici</h2>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md mb-8 border border-gray-100">
                <textarea id="post-text" rows="3" class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 resize-none" placeholder="A cosa stai pensando?"></textarea>
                
                <div class="flex items-center justify-between mt-4">
                    <div class="flex items-center space-x-2">
                        <label for="file-upload" class="cursor-pointer flex items-center text-blue-600 hover:text-blue-700 hover:bg-blue-50 px-3 py-2 rounded-lg transition">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="text-sm font-medium">Foto/Video</span>
                        </label>
                        <input id="file-upload" type="file" class="hidden" accept="image/*,video/*" onchange="document.getElementById('file-name').textContent = this.files[0] ? this.files[0].name : ''">
                        <span id="file-name" class="text-xs text-gray-500 truncate max-w-[150px]"></span>
                    </div>

                    <button onclick="publishPost()" type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-blue-700 transition transform hover:scale-105 active:scale-95">
                        Pubblica post
                    </button>
                </div>
                <div id="status-message" style="display:none;"></div>
            </div>
            <div id="posts-container">
                <div class="flex justify-center py-10">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            </div>

            <div id="confirmation-modal" class="fixed inset-0 bg-black bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
                <div class="relative top-20 mx-auto p-5 border w-96 shadow-2xl rounded-2xl bg-white">
                    <div class="mt-3 text-center">
                        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
                            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.332 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h3 class="text-xl leading-6 font-bold text-gray-900 mt-4">Conferma Eliminazione</h3>
                        <div class="mt-2 px-7 py-3">
                            <p class="text-sm text-gray-500">Sei sicuro di voler eliminare questo post? L'azione è irreversibile.</p>
                        </div>
                        <div class="flex space-x-3 px-4 py-3">
                            <button id="cancel-delete" class="px-4 py-2 bg-gray-200 text-gray-800 text-base font-medium rounded-xl w-full hover:bg-gray-300 transition">Annulla</button>
                            <button id="confirm-delete" class="px-4 py-2 bg-red-600 text-white text-base font-medium rounded-xl w-full shadow-sm hover:bg-red-700 transition">Elimina</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="report-modal" class="fixed inset-0 bg-black bg-opacity-50 overflow-y-auto h-full w-full justify-center items-center z-50">
                <div class="relative bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg mx-4">
                    <h3 class="text-2xl font-bold text-gray-800 mb-4">Segnala Post</h3>
                    <form id="report-form">
                        <input type="hidden" id="reported-post-index">
                        <div class="mb-4">
                            <label for="report-reason" class="block text-gray-700 font-semibold mb-2 text-sm">Motivo della segnalazione:</label>
                            <select id="report-reason" required class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 appearance-none bg-white">
                                <option value="" disabled selected>Seleziona un motivo</option>
                                <option value="contenuto-inappropriato">Contenuto inappropriato</option>
                                <option value="spam">Spam</option>
                                <option value="linguaggio-offensivo">Linguaggio offensivo</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>
                        <div class="mb-6">
                            <label for="report-description" class="block text-gray-700 font-semibold mb-2 text-sm">Descrizione (opzionale):</label>
                            <textarea id="report-description" rows="4" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Aggiungi dettagli..."></textarea>
                        </div>
                        <div class="flex justify-end space-x-4">
                            <button type="button" id="cancel-report" class="px-6 py-2 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition">Annulla</button>
                            <button type="submit" class="px-6 py-2 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition">Invia</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAx_wHQ_K_B0lUSLUQLNupdX8krn0iiHtA",
        authDomain: "spottio-1419e.firebaseapp.com",
        projectId: "spottio-1419e",
        storageBucket: "spottio-1419e.firebasestorage.app", // Assicurati che questo bucket sia abilitato in console
      };
      
      firebase.initializeApp(firebaseConfig);
      window.db = firebase.firestore();
      window.storage = firebase.storage(); // Inizializzazione Storage
    </script>

    <script src="messaggi-posta/public.js"></script>
    <script src="messaggi-posta/reports.js"></script>
    <script src="ingresso_per_Gestione_Utenti/Ingresso_Gestione_Utenti.js"></script>
    <script src="impostazioni/background-color.js"></script>
    <script src="NAV/traduzioni/en.js"></script>
    <script src="NAV/traduzioni/es.js"></script>
    <script src="NAV/traduzioni/fr.js"></script>
    <script src="NAV/language-dropdown.js"></script>
    <script src="NAV/nav.js"></script>
</body>
</html>
