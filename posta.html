<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Post</title>
    <link rel="icon" href="https://i.ibb.co/b5HgvzCB/Spottio-Logo-2.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="posta/posta.css">
</head>
<body class="bg-[#f9fafb] flex min-h-screen">
    
    <div id="sidebar-container" class="w-1/5 bg-white p-6 shadow-sm flex flex-col justify-start items-start sticky top-0 h-screen">
        <h2 id="menu-title" class="text-2xl font-bold text-gray-800 mb-6">Menu</h2>
        <div id="nav-container" class="w-full"></div>
    </div>

    <div class="flex-grow p-4 flex justify-center items-start pt-12">
        <div class="w-full max-w-md">
            <h1 class="text-2xl font-bold text-black mb-6 ml-1">Crea Post</h1>
            
            <form id="public-post-form" class="space-y-4">
                <div class="bg-[#f3f4f6] rounded-2xl p-4">
                    <textarea id="post-text" rows="6" 
                        class="w-full p-4 bg-[#f3f4f6] rounded-lg text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-0"
                        placeholder="Racconta qualcosa..."></textarea>
                </div>

                <div id="file-name" class="text-xs text-gray-500 px-2 italic"></div>
                
                <div class="pt-20 space-y-3">
                    <label for="file-upload" class="cursor-pointer w-full bg-[#e8e4f9] hover:bg-[#ddd8f3] text-black font-semibold py-4 px-6 rounded-2xl flex justify-center items-center gap-3 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span>Aggiungi Media</span>
                        <input id="file-upload" type="file" class="hidden" accept="image/*,video/*" />
                    </label>

                    <button type="submit" id="submit-btn" class="w-full bg-[#212121] hover:bg-black text-white font-bold py-4 px-6 rounded-2xl transition-colors">
                        Pubblica
                    </button>
                </div>
            </form>
            
            <div id="status-message" class="mt-4 text-center text-sm font-medium" style="display:none;"></div>
        </div>
    </div>

    <script src="load-firebase.js"></script>
    <script src="posta/posta.js"></script>
    <script src="load-nav-scripts.js"></script>
</body>
</html>
